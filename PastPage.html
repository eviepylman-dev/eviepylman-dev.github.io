        <h1 style="text-align:center; margin-top:50px; font-size:250%; text-shadow: 1px 1px #d5bcff;">Missed a Month? Fill Out the Form!</h1>
    </div>

    <form method="get" onsubmit="getCatPage(event)">
<fieldset>
    <legend>What Month Did You Miss?</legend>
    <label for="monthmissed">Month Number:</label>
    <input type="number" name="monthmissed" id="monthmissed">
</fieldset>
<fieldset> 
    <legend>Are You Having Fun?</legend>
    <label for="fun">Check Box if So So So <strong style="background-color:#d5bcff">SOS</strong> So So So Fun:</label>
    <input type="checkbox" name="fun" id="fun">
</fieldset>
<input type="submit" style="margin-top:2%;" popovertarget="mypopover" popovertargetaction="show">
</form>
    <div style="margin-top:38%;" id="mypopover" popover="manual">
        <a href="https://euclid.nmu.edu/~epylman/FinalProject/CatPage.html" class="hover" id="importantLink"><button type="button" class="button1">Click Here After Submitting!</button></a>
    </div>

<script>
