<!DOCTYPE html>

<html lang="en">
<head>
    <title>December Catfirmation!</title>
    <meta charset="utf-8">
    <meta name="description" content="Cat of the Month Home Page!">
    <meta name="author" content="Evie Pylman">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTLNCC_t6V8aFcwN5FKCFYX2-mUtGF078eVXg&s">

    <style>

        * {
            background-color:#9898f9;
        }
        .flex{
            display: flex;
            flex-direction: row;
        }
        .flexabout{
            display: flex;
            flex-direction: column;
        }

        .cellbutton{
            width: 97px;
            height: 92px;
            background-color:white;
            border: solid 1px black;
            text-align:center;
        }
        .celltitle{
            width: 92%;
            height: 92.5px;
            background-color: rgb(51, 114, 249);
            border: solid 1px black;
            text-align:center;
            color:white;
            text-shadow: 2px 2px black;
        }
        .cellabout{
            width: 100%;
            height: 90px;
            background-color: rgb(166, 93, 255);
            border: solid 2px black;
            text-align:center;
        }
        .cellabout2{
            width: 100%;
            background-color:#c08dff;
            border: solid 2px black;
            text-align:center;
        }
        #mypopover{
            max-width:50%;
            position:relative;
            top:126%;
            border-style:double;
            border-color:black;
            border-width:8px;
        }
        .button1 {
            display: block;
            width: 50%;
            border: solid, black, 2px;
            border-radius:6px;
            background-color:rgb(166, 93, 255);
            padding: 14px 28px;
            margin:auto;
            margin-top:4%;
            font-size: 28px;
            cursor: pointer;
            text-align: center;
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color:white;
            text-shadow: 1px 1px black;
        }
        .button2 {
            display: block;
            width: 40%;
            border: solid, black, 2px;
            border-radius:6px;
            background-color:#29a6ff;
            padding: 12px 24px;
            margin:auto;
            margin-top:4%;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color:white;
            text-shadow: 1px 1px black;
        }

    </style>

</head>

<body>
    <div class="flex">
        <div class="cellbutton" style="border-style:solid; border-width:2px;">
            <a href="https://euclid.nmu.edu/~epylman/FinalProject/HomePage.html" class="cellbutton"><img src="https://static.vecteezy.com/system/resources/thumbnails/000/355/795/small/Real_Estate__28101_29.jpg" width="100%"></a>
        </div>
        <div class="celltitle" style="border-style:solid; border-width:2px;">
            <h1 style="font-size:230%; background-color:rgb(51, 114, 249);">Catfirmations!</h1>
        </div>
        <div class="cellbutton" style="border-style:solid; border-width:2px;">
            <a href="https://euclid.nmu.edu/~epylman/FinalProject/PastPage.html" class="cellbutton"><img src="https://d1nhio0ox7pgb.cloudfront.net/_img/o_collection_png/green_dark_grey/512x512/plain/undo.png" width="100%"></a>
        </div>
    </div>

    <div>
        <h1 style="text-align:center; margin-top:50px; font-size:250%; text-shadow: 1px 1px #d5bcff;">The Cat of the Month is...</h1>
    </div>

    <button class="button1" popovertarget="mypopover" popovertargetaction="show">Reveal</button>

    <div id="mypopover" popover>
        <img src="https://euclid.nmu.edu/~epylman/ProjectPictures/ChristmasMuf.PNG" alt="If this didn't work im so sorry. just imagine a picture of a cat." width="100%">
        <audio id="catPurr" src="CatPurring.mp3"></audio>
        <button class="button2" onclick="getSound()">Pet the Cat!</button>
        <h3 style="background-color:rgb(166, 93, 255); padding:8%;">"For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life" <br><br> - John 3:16 <br><br>Merry Christmas!</h3>
    </div>




<script>

    function getSound() {
        document.getElementById('catPurr').play();
    }

</script>

</body>

</html>
